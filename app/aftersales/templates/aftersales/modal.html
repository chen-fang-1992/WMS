<style>
#aftersaleDetailModal,
#createAftersaleModal {
	font-size: 0.85em;
}
#aftersaleDetailModal input,
#aftersaleDetailModal select,
#aftersaleDetailModal textarea,
#createAftersaleModal input,
#createAftersaleModal select,
#createAftersaleModal textarea {
	font-size: 1.05em;
	border-radius: 0.375rem !important;
}
#aftersaleDetailModal input:not(:read-only),
#aftersaleDetailModal select,
#aftersaleDetailModal textarea,
#createAftersaleModal input:not(:read-only),
#createAftersaleModal select,
#createAftersaleModal textarea {
	border: 1.5px solid black;
}
#aftersaleDetailModal input:is(:read-only),
#createAftersaleModal input:is(:read-only) {
	background-color: #f8f9fa;
	border: 1px dashed #ccc;
	pointer-events: none;
}
#detail-aftersale-form .form-label,
#create-aftersale-form .form-label {
	margin-bottom: 0.2rem;
}
#detail-aftersale-form .row.compact-row,
#create-aftersale-form .row.compact-row {
	--bs-gutter-x: 0.75rem;
	--bs-gutter-y: 0.25rem;
}
</style>

<div class="modal fade" id="aftersaleDetailModal" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog modal-xl">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title">编辑售后</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>
			<form id="detail-aftersale-form">
				{% csrf_token %}
				<div class="modal-body">
					<div id="aftersale-detail-error" class="alert alert-danger py-2 d-none"></div>
					<div id="aftersale-detail-msg" class="alert alert-success py-2 d-none"></div>
					<div class="row compact-row">
						<div class="col-md-3">
							<label class="form-label">订单号</label>
							<input type="text" class="form-control" name="order_ref" id="detail-order-ref">
						</div>
						<div class="col-md-3">
							<label class="form-label">订单日期</label>
							<input type="text" class="form-control" id="detail-order-date" readonly>
						</div>
						<div class="col-md-6">
							<label class="form-label">SKU</label>
							<input type="text" class="form-control" id="detail-sku-summary" readonly>
						</div>
						<div class="col-md-6">
							<label class="form-label">问题</label>
							<textarea class="form-control" name="issue" id="detail-issue" rows="2"></textarea>
						</div>
						<div class="col-md-3">
							<label class="form-label">处理结果</label>
							<input type="text" class="form-control" name="result" id="detail-result">
						</div>
						<div class="col-md-3">
							<label class="form-label">状态</label>
							<select class="form-select" name="status" id="detail-status">
								<option value="">请选择</option>
								{% for value, label in status_options %}
								<option value="{{ value }}">{{ label }}</option>
								{% endfor %}
							</select>
						</div>
						<div class="col-md-4">
							<label class="form-label">问题归类</label>
							<select class="form-select" name="issue_category" id="detail-issue-category">
								<option value="">请选择</option>
								{% for value, label in issue_category_options %}
								<option value="{{ value }}">{{ label }}</option>
								{% endfor %}
							</select>
						</div>
						<div class="col-md-4">
							<label class="form-label">送货</label>
							<select class="form-select" name="delivery_info" id="detail-delivery-info">
								<option value="">请选择</option>
								{% for value, label in delivery_info_options %}
								<option value="{{ value }}">{{ label }}</option>
								{% endfor %}
							</select>
						</div>
						<div class="col-md-4">
							<label class="form-label">国内售后追踪</label>
							<input type="text" class="form-control" name="domestic_tracking" id="detail-domestic-tracking">
						</div>
						<div class="col-12">
							<label class="form-label">备注</label>
							<textarea class="form-control" name="remark" id="detail-remark" rows="2"></textarea>
						</div>
						<div class="col-12">
							<label class="form-label">产品优化方案</label>
							<textarea class="form-control" name="product_optimization" id="detail-product-optimization" rows="3"></textarea>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<button class="btn btn-primary" type="submit">保存</button>
				</div>
			</form>
		</div>
	</div>
</div>

<div class="modal fade" id="createAftersaleModal" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog modal-xl">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title">新增售后</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>
			<form id="create-aftersale-form">
				{% csrf_token %}
				<div class="modal-body">
					<div id="create-aftersale-error" class="alert alert-danger py-2 d-none"></div>
					<div class="row compact-row">
						<div class="col-md-4">
							<label class="form-label">订单号</label>
							<input type="text" name="order_ref" class="form-control" value="{{ default_order.reference|default:'' }}">
						</div>
						<div class="col-md-8">
							<label class="form-label">SKU</label>
							<input type="text" class="form-control" readonly value="{% if default_order %}{% for line in default_order.lines.all %}{% if line.product and line.product.sku %}{{ line.product.sku }}{% elif line.raw_sku %}{{ line.raw_sku }}{% endif %}{% if not forloop.last %}, {% endif %}{% endfor %}{% endif %}">
						</div>
						<div class="col-md-6">
							<label class="form-label">问题</label>
							<textarea name="issue" class="form-control" rows="2"></textarea>
						</div>
						<div class="col-md-3">
							<label class="form-label">处理结果</label>
							<input type="text" name="result" class="form-control">
						</div>
						<div class="col-md-3">
							<label class="form-label">状态</label>
<select name="status" class="form-select">
								<option value="" selected>请选择</option>
								{% for value, label in status_options %}
								<option value="{{ value }}">{{ label }}</option>
								{% endfor %}
							</select>
						</div>
						<div class="col-md-4">
							<label class="form-label">问题归类</label>
							<select name="issue_category" class="form-select">
								<option value="">请选择</option>
								{% for value, label in issue_category_options %}
								<option value="{{ value }}">{{ label }}</option>
								{% endfor %}
							</select>
						</div>
						<div class="col-md-4">
							<label class="form-label">送货</label>
							<select name="delivery_info" class="form-select">
								<option value="">请选择</option>
								{% for value, label in delivery_info_options %}
								<option value="{{ value }}">{{ label }}</option>
								{% endfor %}
							</select>
						</div>
						<div class="col-md-4">
							<label class="form-label">国内售后追踪</label>
							<input type="text" name="domestic_tracking" class="form-control">
						</div>
						<div class="col-12">
							<label class="form-label">备注</label>
							<textarea name="remark" class="form-control" rows="2"></textarea>
						</div>
						<div class="col-12">
							<label class="form-label">产品优化方案</label>
							<textarea name="product_optimization" class="form-control" rows="3"></textarea>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<button type="submit" class="btn btn-primary">保存</button>
				</div>
			</form>
		</div>
	</div>
</div>
