<div class="modal fade" id="refundDetailModal" tabindex="-1" aria-labelledby="refundDetailModalLabel" aria-hidden="true">
	<div class="modal-dialog modal-xl">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title" id="refundDetailModalLabel">编辑退款</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>
			<form id="detail-edit-form">
				{% csrf_token %}
				<div class="modal-body">
					<div id="refund-detail-error" class="alert alert-danger py-2 d-none"></div>
					<div id="refund-detail-msg" class="alert alert-success py-2 d-none"></div>
					<div class="row g-3">
						<div class="col-md-3">
							<label class="form-label">退款单号</label>
							<input type="text" class="form-control" id="detail-refund-no" readonly>
						</div>
						<div class="col-md-3">
							<label class="form-label">订单号</label>
							<input type="text" class="form-control" name="order_ref" id="detail-order-ref">
						</div>
						<div class="col-md-3">
							<label class="form-label">状态</label>
							<select class="form-select" name="status" id="detail-status-select"></select>
						</div>
						<div class="col-md-3">
							<label class="form-label">金额</label>
							<input type="text" class="form-control" name="amount" id="detail-amount">
						</div>
						<div class="col-12">
							<label class="form-label">退款原因</label>
							<textarea class="form-control" name="reason_detail" id="detail-reason" rows="2"></textarea>
						</div>
						<div class="col-12">
							<label class="form-label">备注</label>
							<textarea class="form-control" name="remark" id="detail-remark" rows="2"></textarea>
						</div>
						<div class="col-12">
							<label class="form-label">取消原因（仅 Cancelled 必填）</label>
							<textarea class="form-control" name="cancel_reason" id="detail-cancel-reason" rows="2"></textarea>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<button class="btn btn-primary" type="submit">保存</button>
				</div>
			</form>
		</div>
	</div>
</div>

<div class="modal fade" id="createRefundModal" tabindex="-1" aria-labelledby="createRefundModalLabel" aria-hidden="true">
	<div class="modal-dialog modal-xl">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title" id="createRefundModalLabel">新增退款</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>
			<form id="create-refund-form">
				{% csrf_token %}
				<div class="modal-body">
					<div id="create-refund-error" class="alert alert-danger py-2 d-none"></div>
					<div class="row g-3">
						<div class="col-md-6">
							<label class="form-label">订单号</label>
							<input type="text" name="order_ref" class="form-control">
						</div>
						<div class="col-md-6">
							<label class="form-label">退款金额</label>
							<input type="number" name="amount" class="form-control" step="0.01">
						</div>
						<div class="col-12">
							<label class="form-label">退款原因</label>
							<textarea name="reason_detail" class="form-control" rows="3"></textarea>
						</div>
						<div class="col-12">
							<label class="form-label">备注</label>
							<textarea name="remark" class="form-control" rows="3"></textarea>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<button type="submit" class="btn btn-primary">保存</button>
				</div>
			</form>
		</div>
	</div>
</div>
