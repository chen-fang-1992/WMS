{% extends 'base.html' %}

{% block content %}
<div class="mx-auto pt-2 px-2" style="max-width: 920px;">
	<h2 class="font-semibold text-teal-700 text-lg mb-3">新增退款</h2>

	{% if error %}
	<div class="alert alert-danger py-2">{{ error }}</div>
	{% endif %}

	<div class="bg-white shadow rounded p-3">
		<form method="post">
			{% csrf_token %}
			<div class="row g-3">
				<div class="col-md-6">
					<label class="form-label">订单号</label>
					<input type="text" name="order_ref" class="form-control" required value="{% if default_order %}{{ default_order.reference }}{% endif %}">
				</div>
				<div class="col-md-6">
					<label class="form-label">退款金额</label>
					<input type="number" name="amount" class="form-control" required step="0.01" min="0.01">
				</div>
				<div class="col-12">
					<label class="form-label">退款原因</label>
					<textarea name="reason_detail" class="form-control" rows="3"></textarea>
				</div>
				<div class="col-12">
					<label class="form-label">备注</label>
					<textarea name="remark" class="form-control" rows="3"></textarea>
				</div>
			</div>

			<div class="mt-3 d-flex gap-2">
				<button class="btn btn-primary" type="submit">创建</button>
				<a class="btn btn-outline-secondary" href="/refunds/">返回列表</a>
			</div>
		</form>
	</div>
</div>
{% endblock %}
